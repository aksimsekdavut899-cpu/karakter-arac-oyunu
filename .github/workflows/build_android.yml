name: Android APK Derle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    env:
      GODOT_VERSION: 4.4.1.stable
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Export sablonlarini dogru yere tasi
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION} ~/.local/share/godot/export_templates/${GODOT_VERSION}

      - name: Debug keystore olustur
        run: |
          keytool -genkeypair -v \
            -keystore "$HOME/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Varliklari ice aktar
        run: |
          godot --headless --verbose --editor --quit

      - name: Android APK derle (debug)
        run: |
          mkdir -v -p build/android
          godot --headless --verbose --export-debug "Android Debug" "$(pwd)/build/android/karakter-arac-oyunu-debug.apk"

      - name: APK'yi yukle (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: karakter-arac-oyunu-apk
          path: build/android/*.apk
